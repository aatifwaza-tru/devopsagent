name: Deploy to WP Engine

on:
  push:
    branches:
      - main
      - dev

jobs:
  php-lint:
    name: PHP Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - name: PHP Syntax Check
        run: find . -name "*.php" -not -path "./vendor/*" | xargs -I{} php -l {}

  deploy:
    name: Deploy to WP Engine
    runs-on: ubuntu-latest
    needs: php-lint
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy to WP Engine
        env:
          WP_ENGINE: ${{ secrets.WP_ENGINE }}
          PROD: ${{ secrets.WPE_PROD_ENV_NAME }}
          DEV: ${{ secrets.WPE_DEV_ENV_NAME }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          if [ "$BRANCH_NAME" == "main" ]; then
            DEPLOY=${PROD}
          elif [ "$BRANCH_NAME" == "dev" ]; then
            DEPLOY=${DEV}
          else
            echo "Unknown branch: $BRANCH_NAME"
            exit 1
          fi

          mkdir -p ~/.ssh
          echo "$WP_ENGINE" | base64 --decode > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/id_rsa
          ssh-keyscan -H -p 22 git.wpengine.com >> ~/.ssh/known_hosts

          git fetch --unshallow 2>/dev/null || true

          git remote remove wpe-remote 2>/dev/null || true
          git remote add wpe-remote git@git.wpengine.com:production/${DEPLOY}.git
          git push -f wpe-remote HEAD:master
